name: App

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - '.github/ISSUE_TEMPLATE/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: false
          dependency-graph: generate-and-submit
          build-scan-publish: true
          build-scan-terms-of-use-url: "https://gradle.com/terms-of-service"
          build-scan-terms-of-use-agree: "yes"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        run: |
          if [ -f "package.json" ]; then
            npm install
          fi
          if [ -d "manager/src/main/assets/editor" ]; then
            cd manager/src/main/assets/editor
            if [ -f "package.json" ]; then
              npm install
            fi
          fi

      - name: Build with Gradle
        id: buildWithGradle
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null || true
          echo 'android.sdk.channel=3' >> gradle.properties
          echo 'android.native.buildOutput=verbose' >> gradle.properties
          echo 'org.gradle.caching=true' >> gradle.properties
          echo 'org.gradle.parallel=true' >> gradle.properties
          chmod +x gradlew
          ./gradlew :manager:assemble
          
          # Ambil nama release APK jika ada, jika tidak gunakan nama bawaan
          APK_NAME=$(ls manager/build/outputs/apk/release/shizuku*-v*-release.apk 2>/dev/null | awk -F '(/|-release.apk)' '{print $6}' || echo "app-release")
          echo "releaseName=$APK_NAME" >> $GITHUB_OUTPUT

      - name: Upload release
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.buildWithGradle.outputs.releaseName }}
          path: "manager/build/outputs/apk"
          compression-level: 9
